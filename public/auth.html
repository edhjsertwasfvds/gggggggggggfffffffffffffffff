<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/images/iconhtml.png" type="image/png">
    <title>Вход</title>
    <script>
        (function () {
            try {
                var raw = localStorage.getItem('localUiSettings');
                if (!raw) return;
                var s = JSON.parse(raw);
                var t = s && s.theme;
                if (!t || t === 'dark') return;
                document.documentElement.classList.add('theme-' + t);
            } catch (_) {}
        })();
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        html { zoom: 80%; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #09090b;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        html.theme-midnight body { background: #05070d; }
        html.theme-indigo body { background: #0b1020; }
        html.theme-emerald body { background: #07120f; }
        html.theme-crimson body { background: #160b10; }
        html.theme-graphite body { background: #0f1116; }
        .panel {
            background: rgba(22, 22, 26, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            border-radius: 16px;
            padding: 36px 32px 32px;
            max-width: 380px;
            width: 100%;
        }
        html.theme-midnight .panel { background: rgba(14, 16, 24, 0.95); border-color: rgba(148,163,184,.16); }
        html.theme-indigo .panel { background: rgba(21, 29, 56, 0.92); border-color: rgba(99,102,241,.22); }
        html.theme-emerald .panel { background: rgba(14, 30, 25, 0.93); border-color: rgba(16,185,129,.22); }
        html.theme-crimson .panel { background: rgba(36, 18, 24, 0.93); border-color: rgba(244,63,94,.2); }
        html.theme-graphite .panel { background: rgba(23, 24, 28, 0.93); border-color: rgba(161,161,170,.18); }
        .icon-wrap {
            width: 52px; height: 52px;
            background: rgba(99, 102, 241, 0.15);
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px;
        }
        .icon-wrap svg { width: 26px; height: 26px; color: #818cf8; }
        h1 {
            font-size: 20px; font-weight: 700;
            text-align: center; margin-bottom: 6px;
        }
        .subtitle {
            font-size: 13px; color: #6b7280;
            text-align: center; margin-bottom: 24px;
        }
        .access-notice {
            background: rgba(99, 102, 241, 0.08);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #a5b4fc;
            text-align: center;
            line-height: 1.5;
        }
        .access-notice-row {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 8px;
        }
        .discord-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: #5865F2;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s, transform 0.1s;
            line-height: 1;
        }
        .discord-btn:hover {
            background: #4752C4;
            transform: translateY(-1px);
        }
        .discord-btn svg {
            width: 20px;
            height: 20px;
        }
        .discord-username {
            color: #a5b4fc;
            font-size: 13px;
            font-weight: 500;
        }
        label {
            display: block; font-size: 13px; font-weight: 500;
            color: #9ca3af; margin-bottom: 6px;
        }
        input {
            width: 100%; padding: 11px 14px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; color: #fff;
            font-size: 14px; font-family: inherit;
            outline: none; transition: border-color 0.2s;
        }
        input:focus { border-color: #6366f1; }
        input::placeholder { color: #4b5563; }
        .field { margin-bottom: 16px; }
        .btn {
            width: 100%; padding: 12px;
            background: #6366f1; color: #fff;
            font-size: 14px; font-weight: 600;
            border: none; border-radius: 10px;
            cursor: pointer; transition: background 0.2s, transform 0.1s;
            font-family: inherit; margin-top: 4px;
        }
        .btn:hover { background: #4f46e5; }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.25);
            color: #f87171; font-size: 13px;
            padding: 10px 14px; border-radius: 8px;
            margin-bottom: 16px; display: none;
            text-align: center;
        }
        .divider {
            display: flex; align-items: center; gap: 12px;
            margin: 20px 0; color: #6b7280; font-size: 12px;
        }
        .divider::before, .divider::after {
            content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.08);
        }
        .invite-link {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            width: 100%; padding: 12px 16px; margin-top: 4px;
            background: rgba(99, 102, 241, 0.08);
            border: 1px solid rgba(99, 102, 241, 0.25);
            border-radius: 10px; color: #a5b4fc;
            font-size: 14px; font-weight: 500; text-decoration: none;
            transition: all 0.2s ease; cursor: pointer;
        }
        .invite-link:hover {
            background: rgba(99, 102, 241, 0.15);
            border-color: rgba(99, 102, 241, 0.4);
            color: #c7d2fe;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.15);
        }
        .invite-link svg {
            width: 18px; height: 18px; flex-shrink: 0;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="panel">
        <div class="icon-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
        </div>
        <h1 id="authTitle">Вход в систему</h1>
        <p class="subtitle" id="authSubtitle">Введите логин и пароль для доступа</p>

        <div class="access-notice" id="accessNotice">
            Доступ только для авторизованных пользователей.
        </div>

        <div class="error-msg" id="errorMsg"></div>

        <form id="loginForm" autocomplete="on" class="auth-form">
            <div class="field">
                <label for="username">Логин</label>
                <input type="text" id="username" name="username" placeholder="Введите логин" autocomplete="username" required>
            </div>
            <div class="field">
                <label for="password">Пароль</label>
                <input type="password" id="password" name="password" placeholder="Введите пароль" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn" id="submitBtn">Войти</button>
            <div class="divider">или</div>
            <a href="#" id="showInviteLink" class="invite-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"/>
                    <path d="M13 5v2"/>
                    <path d="M13 17v2"/>
                    <path d="M13 11v2"/>
                </svg>
                Авторизация через пригласительный код
            </a>
        </form>

        <div id="inviteCodeStep" style="display:none">
            <p class="subtitle mb-4">Введите пригласительный код для регистрации</p>
            <div class="error-msg" id="inviteErrorMsg"></div>
            <div class="field">
                <label for="inviteCodeInput">Пригласительный код</label>
                <input type="text" id="inviteCodeInput" placeholder="Вставьте код из приглашения">
            </div>
            <button type="button" class="btn" id="inviteCodeBtn">Продолжить</button>
            <p class="text-center mt-4">
                <a href="#" id="backToLoginLink" style="color:#818cf8;font-size:13px;text-decoration:none" onmouseover="this.style.textDecoration='underline'" onmouseout="this.style.textDecoration='none'">← Назад к входу</a>
            </p>
        </div>

        <form id="registerForm" autocomplete="on" class="auth-form" style="display:none">
            <input type="hidden" id="regCode" name="regCode">
            <p id="regLevelHint" class="text-center text-sm text-indigo-300 mb-4" style="display:none"></p>
            <div class="field">
                <label for="regUsername">Логин</label>
                <input type="text" id="regUsername" placeholder="Введите логин" autocomplete="username" required>
            </div>
            <div class="field">
                <label for="regPassword">Пароль</label>
                <input type="password" id="regPassword" placeholder="Минимум 6 символов" autocomplete="new-password" required>
            </div>
            <button type="submit" class="btn" id="registerBtn">Зарегистрироваться</button>
        </form>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const errorMsg = document.getElementById('errorMsg');
        const submitBtn = document.getElementById('submitBtn');
        const registerBtn = document.getElementById('registerBtn');
        const accessNotice = document.getElementById('accessNotice');

        const params = new URLSearchParams(window.location.search);
        const inviteFromUrl = params.get('invite');
        const inviteCodeStep = document.getElementById('inviteCodeStep');
        const inviteCodeInput = document.getElementById('inviteCodeInput');
        const inviteCodeBtn = document.getElementById('inviteCodeBtn');
        const inviteErrorMsg = document.getElementById('inviteErrorMsg');

        const levelNames = { 1: 'Мл. модер', 2: 'Модер', 3: 'СТМ / СТА', 4: 'ГА', 5: 'Суперадмин' };
        (async function loadPublicConfig() {
            try {
                const r = await fetch('/api/public-config');
                if (!r.ok) return;
                const cfg = await r.json();
                const url = String(cfg?.authSupportUrl || '').trim();
                const label = String(cfg?.authSupportLabel || '').trim();
                if (accessNotice && url) {
                    const safeLabel = label || 'Связаться с администратором';
                    accessNotice.innerHTML = `
                        Чтобы получить доступ, напиши администратору:
                        <div class="access-notice-row">
                            <a href="${url.replace(/"/g, '&quot;')}" target="_blank" rel="noopener" class="discord-btn">${safeLabel}</a>
                        </div>
                    `;
                }
            } catch (_) {}
        })();

        function showRegForm(code, level) {
            document.getElementById('regCode').value = code;
            inviteCodeStep.style.display = 'none';
            document.getElementById('authSubtitle').textContent = 'Придумайте логин и пароль';
            const hint = document.getElementById('regLevelHint');
            hint.textContent = 'Код даёт уровень ' + level + ' (' + (levelNames[level] || '') + ')';
            hint.style.display = 'block';
            registerForm.style.display = 'block';
        }
        if (inviteFromUrl) {
            form.style.display = 'none';
            document.getElementById('authTitle').textContent = 'Регистрация';
            document.getElementById('authSubtitle').textContent = 'Проверка кода...';
            inviteCodeStep.style.display = 'block';
            inviteCodeInput.value = inviteFromUrl;
            inviteCodeBtn.disabled = true;
            fetch('/api/auth/validate-invite?code=' + encodeURIComponent(inviteFromUrl))
                .then(r => r.json())
                .then(data => {
                    if (data.valid) {
                        showRegForm(inviteFromUrl, data.level);
                    } else {
                        document.getElementById('authSubtitle').textContent = 'Введите пригласительный код';
                        inviteErrorMsg.textContent = 'Код недействителен или уже использован';
                        inviteErrorMsg.style.display = 'block';
                    }
                })
                .catch(() => { document.getElementById('authSubtitle').textContent = 'Введите пригласительный код'; })
                .finally(() => { inviteCodeBtn.disabled = false; });
        }

        document.getElementById('showInviteLink').onclick = (e) => {
            e.preventDefault();
            form.style.display = 'none';
            document.getElementById('authTitle').textContent = 'Регистрация';
            document.getElementById('authSubtitle').textContent = 'Введите пригласительный код';
            inviteCodeStep.style.display = 'block';
            inviteCodeInput.value = '';
            inviteCodeInput.focus();
        };

        document.getElementById('backToLoginLink').onclick = (e) => {
            e.preventDefault();
            inviteCodeStep.style.display = 'none';
            registerForm.style.display = 'none';
            document.getElementById('regLevelHint').style.display = 'none';
            form.style.display = 'block';
            document.getElementById('authTitle').textContent = 'Вход в систему';
            document.getElementById('authSubtitle').textContent = 'Введите логин и пароль для доступа';
        };

        inviteCodeBtn.onclick = async () => {
            const code = inviteCodeInput.value.trim();
            if (!code) { inviteErrorMsg.textContent = 'Введите код'; inviteErrorMsg.style.display = 'block'; return; }
            inviteErrorMsg.style.display = 'none';
            inviteCodeBtn.disabled = true;
            inviteCodeBtn.textContent = 'Проверка...';
            try {
                const res = await fetch('/api/auth/validate-invite?code=' + encodeURIComponent(code));
                const data = await res.json();
                if (data.valid) {
                    showRegForm(code, data.level);
                } else {
                    inviteErrorMsg.textContent = 'Код недействителен или уже использован';
                    inviteErrorMsg.style.display = 'block';
                }
            } catch (_) {
                inviteErrorMsg.textContent = 'Ошибка проверки';
                inviteErrorMsg.style.display = 'block';
            }
            inviteCodeBtn.disabled = false;
            inviteCodeBtn.textContent = 'Продолжить';
        };

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.style.display = 'none';
            submitBtn.disabled = true;
            submitBtn.textContent = 'Вход...';

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (data.success) {
                    localStorage.setItem('user', JSON.stringify({
                        id: data.user.id,
                        username: data.user.username,
                        displayName: data.user.displayName,
                        level: data.user.level,
                        sessionToken: data.sessionToken,
                        expiresAt: data.expiresAt
                    }));
                    window.location.href = '/';
                } else {
                    errorMsg.textContent = data.error || 'Ошибка авторизации';
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.textContent = 'Ошибка соединения с сервером';
                errorMsg.style.display = 'block';
            }

            submitBtn.disabled = false;
            submitBtn.textContent = 'Войти';
        });

        inviteCodeInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') inviteCodeBtn.click(); });

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.style.display = 'none';
            registerBtn.disabled = true;
            registerBtn.textContent = 'Регистрация...';

            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            const code = document.getElementById('regCode').value.trim();

            try {
                const res = await fetch('/api/auth/register-by-invite', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, inviteCode: code })
                });
                const data = await res.json();

                if (data.success) {
                    localStorage.setItem('user', JSON.stringify({
                        id: data.user.id,
                        username: data.user.username,
                        displayName: data.user.displayName,
                        level: data.user.level,
                        sessionToken: data.sessionToken,
                        expiresAt: data.expiresAt
                    }));
                    window.location.href = '/';
                } else {
                    errorMsg.textContent = data.error || 'Ошибка регистрации';
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.textContent = 'Ошибка соединения с сервером';
                errorMsg.style.display = 'block';
            }

            registerBtn.disabled = false;
            registerBtn.textContent = 'Зарегистрироваться';
        });

        if (localStorage.getItem('user') && !inviteCode) {
            try {
                const u = JSON.parse(localStorage.getItem('user'));
                if (u && u.sessionToken) window.location.href = '/';
            } catch (_) {}
        }
    </script>
    <script>
        (async function() {
            try {
                try {
                    const u = JSON.parse(localStorage.getItem('user') || '{}');
                    if ((u.level || 0) >= 5) return;
                    if (u.sessionToken) {
                        const meRes = await fetch('/api/me', { headers: { 'Authorization': 'Bearer ' + u.sessionToken } });
                        if (meRes.ok) {
                            const me = await meRes.json();
                            if ((me.level || 0) >= 5) return;
                        }
                    }
                } catch (_) {}
                const u2 = JSON.parse(localStorage.getItem('user') || '{}');
                const r = await fetch('/api/maintenance', { headers: u2.sessionToken ? { 'Authorization': 'Bearer ' + u2.sessionToken } : {} });                const { active, message } = await r.json();
                if (!active) return;
                const el = document.createElement('div');
                el.id = 'maintenanceBanner';
                el.className = 'fixed inset-0 z-[200] flex items-center justify-center p-4 bg-black/40';
                const txt = (message || 'Проводятся технические работы.').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                el.innerHTML = '<div class="bg-[#1a1a1e] border border-amber-500/30 rounded-2xl p-6 max-w-md shadow-2xl text-center"><div class="text-amber-400 text-2xl mb-3"><i class="ph ph-wrench"></i></div><p class="text-amber-400 font-bold text-lg mb-2">ТЕХ. РАБОТЫ</p><p class="text-gray-300 text-sm">' + txt + '</p></div>';
                document.body.appendChild(el);
            } catch (_) {}
        })();
    </script>
</body>
</html>
