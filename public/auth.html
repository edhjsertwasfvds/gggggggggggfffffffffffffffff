<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/images/iconhtml.png" type="image/png">
    <title>Вход</title>
    <script>
        (function () {
            try {
                var raw = localStorage.getItem('localUiSettings');
                if (!raw) return;
                var s = JSON.parse(raw);
                var t = s && s.theme;
                if (!t || t === 'dark') return;
                document.documentElement.classList.add('theme-' + t);
            } catch (_) {}
        })();
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #09090b;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        html.theme-midnight body { background: #05070d; }
        html.theme-indigo body { background: #0b1020; }
        html.theme-emerald body { background: #07120f; }
        html.theme-crimson body { background: #160b10; }
        html.theme-graphite body { background: #0f1116; }
        .panel {
            background: rgba(22, 22, 26, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            border-radius: 16px;
            padding: 36px 32px 32px;
            max-width: 380px;
            width: 100%;
        }
        html.theme-midnight .panel { background: rgba(14, 16, 24, 0.95); border-color: rgba(148,163,184,.16); }
        html.theme-indigo .panel { background: rgba(21, 29, 56, 0.92); border-color: rgba(99,102,241,.22); }
        html.theme-emerald .panel { background: rgba(14, 30, 25, 0.93); border-color: rgba(16,185,129,.22); }
        html.theme-crimson .panel { background: rgba(36, 18, 24, 0.93); border-color: rgba(244,63,94,.2); }
        html.theme-graphite .panel { background: rgba(23, 24, 28, 0.93); border-color: rgba(161,161,170,.18); }
        .icon-wrap {
            width: 52px; height: 52px;
            background: rgba(99, 102, 241, 0.15);
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px;
        }
        .icon-wrap svg { width: 26px; height: 26px; color: #818cf8; }
        h1 {
            font-size: 20px; font-weight: 700;
            text-align: center; margin-bottom: 6px;
        }
        .subtitle {
            font-size: 13px; color: #6b7280;
            text-align: center; margin-bottom: 24px;
        }
        .access-notice {
            background: rgba(99, 102, 241, 0.08);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #a5b4fc;
            text-align: center;
            line-height: 1.5;
        }
        .access-notice-row {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 8px;
        }
        .discord-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: #5865F2;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s, transform 0.1s;
            line-height: 1;
        }
        .discord-btn:hover {
            background: #4752C4;
            transform: translateY(-1px);
        }
        .discord-btn svg {
            width: 20px;
            height: 20px;
        }
        .discord-username {
            color: #a5b4fc;
            font-size: 13px;
            font-weight: 500;
        }
        label {
            display: block; font-size: 13px; font-weight: 500;
            color: #9ca3af; margin-bottom: 6px;
        }
        input {
            width: 100%; padding: 11px 14px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; color: #fff;
            font-size: 14px; font-family: inherit;
            outline: none; transition: border-color 0.2s;
        }
        input:focus { border-color: #6366f1; }
        input::placeholder { color: #4b5563; }
        .field { margin-bottom: 16px; }
        .btn {
            width: 100%; padding: 12px;
            background: #6366f1; color: #fff;
            font-size: 14px; font-weight: 600;
            border: none; border-radius: 10px;
            cursor: pointer; transition: background 0.2s, transform 0.1s;
            font-family: inherit; margin-top: 4px;
        }
        .btn:hover { background: #4f46e5; }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.25);
            color: #f87171; font-size: 13px;
            padding: 10px 14px; border-radius: 8px;
            margin-bottom: 16px; display: none;
            text-align: center;
        }
        .divider {
            display: flex; align-items: center; gap: 12px;
            margin: 20px 0; color: #6b7280; font-size: 12px;
        }
        .divider::before, .divider::after {
            content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.08);
        }
        .invite-link {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            width: 100%; padding: 12px 16px; margin-top: 4px;
            background: rgba(99, 102, 241, 0.08);
            border: 1px solid rgba(99, 102, 241, 0.25);
            border-radius: 10px; color: #a5b4fc;
            font-size: 14px; font-weight: 500; text-decoration: none;
            transition: all 0.2s ease; cursor: pointer;
        }
        .invite-link:hover {
            background: rgba(99, 102, 241, 0.15);
            border-color: rgba(99, 102, 241, 0.4);
            color: #c7d2fe;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.15);
        }
        .invite-link svg {
            width: 18px; height: 18px; flex-shrink: 0;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="panel">
        <div class="icon-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
        </div>
        <h1 id="authTitle">Вход в систему</h1>
        <p class="subtitle" id="authSubtitle">Авторизация через Discord</p>

        <div class="access-notice" id="accessNotice">
            Доступ только для участников Discord-сервера FearProject с ролью стаффа.
        </div>

        <div class="error-msg" id="errorMsg"></div>

        <a href="/api/auth/discord" id="discordLoginBtn" class="discord-btn" style="width:100%;justify-content:center;padding:12px 16px;margin-top:4px;display:none">
            <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
            </svg>
            Войти через Discord
        </a>
        <p class="subtitle" id="redirectHint" style="margin-top:16px;display:none">
            Перенаправление на Discord...
        </p>
    </div>

    <script>
        const errorMsg = document.getElementById('errorMsg');
        const accessNotice = document.getElementById('accessNotice');
        const discordBtn = document.getElementById('discordLoginBtn');
        const redirectHint = document.getElementById('redirectHint');

        const params = new URLSearchParams(window.location.search);
        const errorFromUrl = params.get('error');
        const discordAuthData = params.get('discord_auth');

        if (errorFromUrl) {
            const errorMap = {
                'discord_denied': 'Вход через Discord отменён',
                'invalid_state': 'Ошибка безопасности (state). Попробуйте ещё раз.',
                'discord_callback': 'Ошибка Discord. Попробуйте позже.'
            };
            errorMsg.textContent = errorMap[errorFromUrl] || 'Ошибка авторизации';
            errorMsg.style.display = 'block';
        }

        if (discordAuthData) {
            try {
                const normalized = discordAuthData.replace(/-/g, '+').replace(/_/g, '/');
                const data = JSON.parse(atob(normalized));
                if (data && data.sessionToken) {
                    localStorage.setItem('user', JSON.stringify(data));
                    window.location.replace('/');
                }
            } catch (e) {
                errorMsg.textContent = 'Ошибка обработки Discord-авторизации';
                errorMsg.style.display = 'block';
            }
        }

        (async function loadPublicConfig() {
            try {
                const r = await fetch('/api/public-config');
                if (!r.ok) return;
                const cfg = await r.json();
                const url = String(cfg?.authSupportUrl || '').trim();
                const label = String(cfg?.authSupportLabel || '').trim();
                if (accessNotice && url) {
                    const safeLabel = label || 'Связаться с администратором';
                    accessNotice.innerHTML = `
                        Чтобы получить доступ, напиши администратору:
                        <div class="access-notice-row">
                            <a href="${url.replace(/"/g, '&quot;')}" target="_blank" rel="noopener" class="discord-btn">${safeLabel}</a>
                        </div>
                    `;
                }
                if (discordBtn && cfg?.discordAuthEnabled) {
                    discordBtn.style.display = 'inline-flex';
                    if (!errorFromUrl && !discordAuthData) {
                        redirectHint.style.display = 'block';
                        setTimeout(() => {
                            window.location.href = discordBtn.href;
                        }, 1200);
                    }
                } else {
                    discordBtn.style.display = 'none';
                }
            } catch (_) {}
        })();
    </script>
    <script>
        (async function() {
            try {
                try {
                    const u = JSON.parse(localStorage.getItem('user') || '{}');
                    if ((u.level || 0) >= 5) return;
                    if (u.sessionToken) {
                        const meRes = await fetch('/api/me', { headers: { 'Authorization': 'Bearer ' + u.sessionToken } });
                        if (meRes.ok) {
                            const me = await meRes.json();
                            if ((me.level || 0) >= 5) return;
                        }
                    }
                } catch (_) {}
                const u2 = JSON.parse(localStorage.getItem('user') || '{}');
                const r = await fetch('/api/maintenance', { headers: u2.sessionToken ? { 'Authorization': 'Bearer ' + u2.sessionToken } : {} });                const { active, message } = await r.json();
                if (!active) return;
                const el = document.createElement('div');
                el.id = 'maintenanceBanner';
                el.className = 'fixed inset-0 z-[200] flex items-center justify-center p-4 bg-black/40';
                const txt = (message || 'Проводятся технические работы.').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                el.innerHTML = '<div class="bg-[#1a1a1e] border border-amber-500/30 rounded-2xl p-6 max-w-md shadow-2xl text-center"><div class="text-amber-400 text-2xl mb-3"><i class="ph ph-wrench"></i></div><p class="text-amber-400 font-bold text-lg mb-2">ТЕХ. РАБОТЫ</p><p class="text-gray-300 text-sm">' + txt + '</p></div>';
                document.body.appendChild(el);
            } catch (_) {}
        })();
    </script>
</body>
</html>
