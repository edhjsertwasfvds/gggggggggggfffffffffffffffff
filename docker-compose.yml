version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fearstaff
      POSTGRES_PASSWORD: fearstaff_dev
      POSTGRES_DB: fearstaff
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fearstaff"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
      DISCORD_REDIRECT_URL: http://localhost:8080/api/auth/callback
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID}
      JWT_SECRET: dev-secret-change-in-production
      DATABASE_URL: postgresql://fearstaff:fearstaff_dev@postgres:5432/fearstaff
      FRONTEND_URL: http://localhost:5173
      PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    environment:
      VITE_API_URL: http://localhost:8080
    depends_on:
      - backend

volumes:
  pgdata:
