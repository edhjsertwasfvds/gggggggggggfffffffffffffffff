<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/images/iconhtml.png" type="image/png">
    <title>Fear Project - Server Status</title>
    <link rel="preconnect" href="https://cdn.tailwindcss.com">
    <link rel="preconnect" href="https://unpkg.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link rel="preload" as="style" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
    <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #09090b;
        }
        body.theme-midnight {
            background-color: #05070d;
        }
        body.theme-indigo {
            background-color: #0b1020;
        }
        body.theme-emerald {
            background-color: #07120f;
        }
        body.theme-crimson {
            background-color: #160b10;
        }
        body.theme-graphite {
            background-color: #0f1116;
        }
        .glass-panel {
            background: rgba(22, 22, 26, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }
        body.theme-midnight .glass-panel {
            background: rgba(14, 16, 24, 0.92);
            border-color: rgba(148, 163, 184, 0.14);
        }
        body.theme-indigo .glass-panel {
            background: rgba(21, 29, 56, 0.88);
            border-color: rgba(99, 102, 241, 0.2);
        }
        body.theme-emerald .glass-panel {
            background: rgba(14, 30, 25, 0.9);
            border-color: rgba(16, 185, 129, 0.2);
        }
        body.theme-crimson .glass-panel {
            background: rgba(36, 18, 24, 0.9);
            border-color: rgba(244, 63, 94, 0.18);
        }
        body.theme-graphite .glass-panel {
            background: rgba(23, 24, 28, 0.9);
            border-color: rgba(161, 161, 170, 0.16);
        }
        .grid-bg {
            background-image:
                linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 32px 32px;
            mask-image: radial-gradient(circle at 0 0, black 40%, transparent 80%);
            -webkit-mask-image: radial-gradient(circle at 0 0, black 40%, transparent 80%);
        }
        .dropdown-item {
            position: relative;
            transition: background 0.2s ease;
        }
        .dropdown-item:not(:last-child) {
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }
        .dropdown-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        .dropdown-item.active {
            background: rgba(88, 101, 242, 0.1);
        }
        .dropdown-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 20%;
            bottom: 20%;
            width: 3px;
            border-radius: 0 3px 3px 0;
            background: #6366f1;
            animation: indicator-in 0.2s ease-out;
        }
        @keyframes indicator-in {
            from { opacity: 0; transform: scaleY(0); }
            to { opacity: 1; transform: scaleY(1); }
        }
        .tab-btn.active {
            color: white;
            border-bottom-color: #6366f1;
        }
        button:not(.dropdown-item), a { transition: opacity 0.12s ease-out; }
        button:not(.dropdown-item):hover, a:hover { opacity: 0.88; }
        #sidePanel {
            min-width: min(1200px, calc(100vw - 700px));
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
        }
        #sidePanel.show {
            opacity: 1;
            pointer-events: auto;
        }
        .yooma-logo-wrap {
            width: 40px;
            height: 40px;
            min-width: 40px;
            min-height: 40px;
            border-radius: 50%;
            background: rgba(88, 101, 242, 0.12);
            border: 1px solid rgba(88, 101, 242, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
        }
        .yooma-logo-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            border-radius: 50%;
        }
        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #10b981;
            flex-shrink: 0;
        }
        #panelContent {
            min-height: 280px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        #panelContent table { width: 100%; }
        #panelContent tr.row-new {
            animation: row-in 0.25s ease-out both;
        }
        @keyframes row-in {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .badge-bump {
            animation: badge-bump 0.35s ease-out;
        }
        @keyframes badge-bump {
            0%   { transform: scale(1); }
            40%  { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        .hide-scrollbar {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        #monthDropdownList {
            scrollbar-width: thin;
            scrollbar-color: #333 transparent;
        }
        #monthDropdownList::-webkit-scrollbar { width: 4px; }
        #monthDropdownList::-webkit-scrollbar-track { background: transparent; }
        #monthDropdownList::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
        #monthDropdownList::-webkit-scrollbar-thumb:hover { background: #555; }
        body {
            scrollbar-width: none;
            -ms-overflow-style: none;
            scroll-behavior: smooth;
        }
        body::-webkit-scrollbar { display: none; }
        #playerModal:not(.hidden) {
            animation: modal-in 0.2s ease-out;
        }
        @keyframes modal-in {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        body.local-no-anim *, body.local-no-anim *::before, body.local-no-anim *::after {
            animation: none !important;
            transition: none !important;
        }
        body.local-soft-anim * {
            animation-duration: 0.12s !important;
            transition-duration: 0.12s !important;
        }
        .local-opt-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 6px 10px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.03);
            color: #9ca3af;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.15s ease;
            user-select: none;
            cursor: pointer;
        }
        .local-opt-btn:hover { background: rgba(255, 255, 255, 0.06); color: #d1d5db; }
        .local-opt-btn.active {
            background: rgba(99, 102, 241, 0.2);
            border-color: rgba(99, 102, 241, 0.45);
            color: #c7d2fe;
            box-shadow: inset 0 0 0 1px rgba(99, 102, 241, 0.25);
        }
        /* Fix browser default white dropdown menus */
        select, select option {
            background-color: #0b1224;
            color: #e5e7eb;
        }
        select option:checked {
            background-color: rgba(99, 102, 241, 0.25);
            color: #e0e7ff;
        }
        .ui-select-wrap { position: relative; width: 100%; }
        .ui-select-trigger {
            width: 100%;
            display: inline-flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 8px 12px;
            color: #f3f4f6;
            font-size: 14px;
            line-height: 1.2;
        }
        .ui-select-trigger:hover { background: rgba(255, 255, 255, 0.08); }
        .ui-select-trigger.open, .ui-select-trigger:focus-visible {
            outline: none;
            border-color: rgba(99, 102, 241, 0.55);
        }
        .ui-select-menu {
            position: absolute;
            z-index: 90;
            left: 0;
            right: auto;
            top: calc(100% + 6px);
            min-width: 100%;
            max-height: 260px;
            overflow-y: auto;
            padding: 6px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(19, 21, 27, 0.98);
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.45);
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .ui-select-menu::-webkit-scrollbar { display: none; }
        .ui-select-item {
            width: 100%;
            border: 0;
            background: transparent;
            color: #d1d5db;
            text-align: left;
            font-size: 13px;
            line-height: 1.2;
            padding: 9px 10px;
            border-radius: 8px;
            transition: background-color .12s ease, color .12s ease;
        }
        .ui-select-item:hover { background: rgba(255, 255, 255, .08); color: #fff; }
        .ui-select-item.active { background: rgba(99, 102, 241, .2); color: #c7d2fe; }
        .month-select-wrap { width: auto !important; }
        .month-select-trigger {
            width: auto;
            min-width: 180px;
            padding: 6px 10px;
            font-size: 13px;
        }
        .month-select-trigger.open, .month-select-trigger:focus-visible { border-color: rgba(255, 255, 255, 0.26) !important; }
        .month-select-menu { border-color: rgba(255, 255, 255, 0.12); background: rgba(19, 21, 27, 0.98); }
        .month-select-item.active { background: rgba(99, 102, 241, .2); color: #c7d2fe; }
        .players-columns-menu {
            padding: 8px 10px;
            min-width: 148px;
        }
        body.theme-midnight .ui-select-menu { border-color: rgba(148, 163, 184, .25); background: rgba(14, 16, 24, .98); }
        body.theme-midnight .ui-select-item.active { background: rgba(148, 163, 184, .18); color: #cbd5e1; }
        body.theme-indigo .ui-select-menu { border-color: rgba(99, 102, 241, .28); background: rgba(21, 29, 56, .98); }
        body.theme-indigo .ui-select-item.active { background: rgba(99, 102, 241, .2); color: #a5b4fc; }
        body.theme-emerald .ui-select-menu { border-color: rgba(16, 185, 129, .25); background: rgba(13, 26, 23, .98); }
        body.theme-emerald .ui-select-item.active { background: rgba(16, 185, 129, .18); color: #34d399; }
        body.theme-crimson .ui-select-menu { border-color: rgba(244, 63, 94, .25); background: rgba(36, 18, 24, .98); }
        body.theme-crimson .ui-select-item.active { background: rgba(244, 63, 94, .18); color: #fda4af; }
        body.theme-graphite .ui-select-menu { border-color: rgba(161, 161, 170, .24); background: rgba(23, 24, 28, .98); }
        body.theme-graphite .ui-select-item.active { background: rgba(161, 161, 170, .16); color: #d4d4d8; }
        body.theme-midnight .month-select-menu { border-color: rgba(148, 163, 184, .25); background: rgba(14, 16, 24, .98); }
        body.theme-indigo .month-select-menu { border-color: rgba(99, 102, 241, .28); background: rgba(21, 29, 56, .98); }
        body.theme-emerald .month-select-menu { border-color: rgba(16, 185, 129, .25); background: rgba(13, 26, 23, .98); }
        body.theme-crimson .month-select-menu { border-color: rgba(244, 63, 94, .25); background: rgba(36, 18, 24, .98); }
        body.theme-graphite .month-select-menu { border-color: rgba(161, 161, 170, .24); background: rgba(23, 24, 28, .98); }

        /* Anti-flicker: hide shell until session init */
        body.app-preload #loginButton {
            opacity: 0 !important;
            visibility: hidden !important;
            pointer-events: none !important;
        }
        /* Hide admin panel during preload to avoid flash before session init */
        body.app-preload #adminPanel {
            opacity: 0 !important;
            pointer-events: none !important;
        }
    </style>
</head>
<body class="bg-[#09090b] text-white min-h-screen w-full relative overflow-hidden selection:bg-[#5865F2] selection:text-white app-preload">

    <div class="fixed inset-0 pointer-events-none z-0">
        <div class="absolute inset-0 grid-bg"></div>
        <div class="absolute -top-[200px] -left-[200px] w-[600px] h-[600px] bg-[#5865F2] rounded-full blur-[120px] opacity-[0.07]"></div>
        <div class="absolute top-[20%] left-[10%] w-[300px] h-[300px] bg-indigo-500 rounded-full blur-[100px] opacity-[0.05]"></div>
    </div>

    <div id="loginButton" class="fixed top-12 right-12 z-50">
        <a href="/auth" class="glass-panel px-6 py-3 rounded-xl flex items-center gap-3 hover:bg-white/[0.05]">
            <i class="ph-fill ph-sign-in text-indigo-400 text-2xl"></i>
            <span class="text-white font-semibold">Войти</span>
        </a>
    </div>

    <aside id="adminPanel" class="fixed top-12 right-12 z-50 w-[280px] hidden">
        <div class="glass-panel p-4 rounded-2xl mb-4">
            <div class="flex flex-col items-center">
                <div id="userAvatar" class="hidden"></div>
                <h3 id="userName" class="text-white font-bold text-center text-lg mb-1">Username</h3>
                <p class="text-gray-400 text-xs text-center mb-4">Администратор</p>
                <button type="button" onclick="logout()" class="w-full bg-white/5 hover:bg-white/10 text-gray-300 font-semibold py-2 px-4 rounded-lg text-sm">
                    Выйти
                </button>
            </div>
        </div>

        <div id="adminMenu" class="glass-panel rounded-2xl overflow-hidden">
            <div class="p-4 border-b border-white/[0.08]">
                <h3 class="text-white font-bold text-sm">Панель управления</h3>
            </div>
            <nav class="p-2">
                <a href="/settings" class="block w-full px-4 py-3 text-left text-gray-300 hover:bg-white/[0.05] rounded-lg flex items-center gap-3 mb-1">
                    <i class="ph ph-gear text-lg"></i>
                    <span class="text-sm font-medium">Настройки</span>
                </a>
                <a href="/logs" class="block w-full px-4 py-3 text-left text-gray-300 hover:bg-white/[0.05] rounded-lg flex items-center gap-3 mb-1">
                    <i class="ph ph-list-bullets text-lg"></i>
                    <span class="text-sm font-medium">Логи действий</span>
                </a>
                <button type="button" onclick="openLocalSettingsModal()" class="block w-full px-4 py-3 text-left text-gray-300 hover:bg-white/[0.05] rounded-lg flex items-center gap-3 mb-1">
                    <i class="ph ph-sliders text-lg"></i>
                    <span class="text-sm font-medium">Локальные настройки</span>
                </button>
                <a href="/whitelist" class="block w-full px-4 py-3 text-left text-gray-300 hover:bg-white/[0.05] rounded-lg flex items-center gap-3">
                    <i class="ph ph-check-circle text-lg"></i>
                    <span class="text-sm font-medium">Список чистых</span>
                </a>
                <a href="/faq" class="block w-full px-4 py-3 text-left text-gray-400 hover:bg-white/[0.05] rounded-lg flex items-center gap-3 mt-1">
                    <i class="ph ph-question text-lg"></i>
                    <span class="text-sm font-medium">FAQ</span>
                </a>
            </nav>
        </div>
    </aside>

    <aside id="leftNav" class="absolute top-12 left-12 z-50">
        <section class="glass-panel p-3 pr-6 rounded-2xl flex items-center gap-4 relative min-w-[240px] mb-4">
            <div class="relative w-[52px] h-[52px] rounded-xl flex items-center justify-center shrink-0 overflow-hidden">

    <script>
        // Auth bootstrap (cookie-only):
        // - Проверяем сессию через API
        // - Если не авторизован -> редирект на /auth?next=...
        // - Если авторизован -> грузим защищённые JS ассеты
        (function () {
            function clearAuth() {
                try { localStorage.removeItem('user'); } catch (_) {}
                try {
                    var secure = location && location.protocol === 'https:' ? 'Secure; ' : '';
                    document.cookie = 'sessionToken=; Path=/; SameSite=Lax; ' + secure + 'Max-Age=0';
                    document.cookie = 'XSRF-TOKEN=; Path=/; SameSite=Lax; ' + secure + 'Max-Age=0';
                } catch (_) {}
            }
            function redirectToAuth() {
                var next = '';
                try { next = (location && (location.pathname + location.search + location.hash)) || '/'; } catch (_) { next = '/'; }
                location.href = '/auth?next=' + encodeURIComponent(next);
            }
            function loadScript(src) {
                return new Promise(function (resolve, reject) {
                    var s = document.createElement('script');
                    s.src = src;
                    s.async = false;
                    s.onload = function () { resolve(); };
                    s.onerror = function () { reject(new Error('Failed to load: ' + src)); };
                    document.body.appendChild(s);
                });
            }

            fetch('/api/auth/session', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'same-origin',
                body: '{}'
            }).then(function (r) {
                if (!r.ok) throw new Error('Session invalid');
                return r.json();
            }).then(function (data) {
                if (!data || !data.valid) throw new Error('Session invalid');
                try {
                    var session = data.session || {};
                    localStorage.setItem('user', JSON.stringify({
                        id: session.userId,
                        username: session.username,
                        displayName: session.displayName,
                        level: session.level || 0,
                        expiresAt: session.expiresAt
                    }));
                } catch (_) {}
                return loadScript('/js/session.js').then(function () { return loadScript('/script.js'); });
            }).catch(function () {
                clearAuth();
                redirectToAuth();
            });
        })();
    </script>
