<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/images/fearsearch-logo.webp" type="image/webp">
    <title>Регистрация — FearSearch</title>
    <script>
        (function () {
            try {
                var raw = localStorage.getItem('localUiSettings');
                if (!raw) return;
                var s = JSON.parse(raw);
                var t = s && s.theme;
                if (!t || t === 'dark') return;
                document.documentElement.classList.add('theme-' + t);
            } catch (_) {}
        })();
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #09090b;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .panel {
            background: rgba(22, 22, 26, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            border-radius: 16px;
            padding: 36px 32px 32px;
            max-width: 420px;
            width: 100%;
        }
        .icon-wrap {
            width: 52px; height: 52px;
            background: rgba(99, 102, 241, 0.15);
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px;
        }
        .icon-wrap img { width: 32px; height: 32px; object-fit: contain; }
        h1 { font-size: 20px; font-weight: 700; text-align: center; margin-bottom: 6px; }
        .subtitle { font-size: 13px; color: #6b7280; text-align: center; margin-bottom: 24px; }
        .notice {
            background: rgba(99, 102, 241, 0.08);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #a5b4fc;
            line-height: 1.5;
        }
        label { display: block; font-size: 13px; font-weight: 500; color: #9ca3af; margin-bottom: 6px; }
        input {
            width: 100%; padding: 11px 14px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; color: #fff;
            font-size: 14px; font-family: inherit;
            outline: none; transition: border-color 0.2s;
        }
        input:focus { border-color: #6366f1; }
        input::placeholder { color: #4b5563; }
        .field { margin-bottom: 16px; }
        .btn {
            width: 100%; padding: 12px;
            background: #6366f1; color: #fff;
            font-size: 14px; font-weight: 600;
            border: none; border-radius: 10px;
            cursor: pointer; transition: background 0.2s, transform 0.1s;
            font-family: inherit; margin-top: 4px;
        }
        .btn:hover { background: #4f46e5; }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-secondary { background: transparent; border: 1px solid rgba(255,255,255,0.1); color: #9ca3af; margin-top: 10px; }
        .btn-secondary:hover { background: rgba(255,255,255,0.04); color: #fff; }
        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.25);
            color: #f87171; font-size: 13px;
            padding: 10px 14px; border-radius: 8px;
            margin-bottom: 16px; display: none;
            text-align: center;
        }
        .success-msg {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.25);
            color: #4ade80; font-size: 13px;
            padding: 10px 14px; border-radius: 8px;
            margin-bottom: 16px; display: none;
            text-align: center;
        }
        .links { margin-top: 18px; text-align: center; font-size: 13px; }
        .links a { color: #818cf8; text-decoration: none; }
        .links a:hover { text-decoration: underline; }
        .hint { font-size: 12px; color: #6b7280; margin-top: 6px; }
    </style>
</head>
<body>
    <div class="panel">
        <div class="icon-wrap">
            <img src="/images/fearsearch-logo.webp" alt="FearSearch">
        </div>
        <h1>Регистрация</h1>
        <p class="subtitle">Создание аккаунта стаффа</p>

        <div class="notice">
            Для регистрации укажите ваш Steam ID. Бот найдёт ваш Discord и отправит в личку сообщение для подтверждения.
        </div>

        <div class="error-msg" id="errorMsg"></div>
        <div class="success-msg" id="successMsg"></div>

        <form id="registerForm">
            <div class="field">
                <label for="username">Логин</label>
                <input type="text" id="username" placeholder="2-32 символа" autocomplete="username" required>
            </div>
            <div class="field">
                <label for="password">Пароль</label>
                <input type="password" id="password" placeholder="Минимум 6 символов" autocomplete="new-password" required>
            </div>
            <div class="field">
                <label for="steamId">Steam ID</label>
                <input type="text" id="steamId" placeholder="76561198xxxxxxxx" required>
                <div class="hint">Steam ID 64 (начинается с 765611...)</div>
            </div>
            <button type="submit" class="btn" id="registerBtn">Зарегистрироваться</button>
        </form>

        <div class="links">
            <a href="/auth.html">Уже есть аккаунт? Войти</a>
        </div>
    </div>

    <script>
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');
        const registerBtn = document.getElementById('registerBtn');

        // Предзаполнение Steam ID из query параметра (для лаунчера)
        const params = new URLSearchParams(window.location.search);
        const steamIdParam = params.get('steamId');
        if (steamIdParam) {
            document.getElementById('steamId').value = steamIdParam;
        }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
            registerBtn.disabled = true;
            registerBtn.textContent = 'Регистрация...';

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const steamId = document.getElementById('steamId').value.trim();

            if (username.length < 2 || username.length > 32) {
                showError('Логин: 2-32 символа');
                return;
            }
            if (password.length < 6) {
                showError('Пароль минимум 6 символов');
                return;
            }
            if (!/^765611[0-9]{12}$/.test(steamId)) {
                showError('Неверный формат Steam ID');
                return;
            }

            try {
                const r = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, steamId })
                });
                const data = await r.json();
                if (!r.ok) {
                    throw new Error(data.error || 'Ошибка регистрации');
                }
                successMsg.textContent = data.message || 'Регистрация начата. Проверьте личные сообщения в Discord.';
                successMsg.style.display = 'block';
                document.getElementById('registerForm').reset();
            } catch (err) {
                showError(err.message);
            } finally {
                registerBtn.disabled = false;
                registerBtn.textContent = 'Зарегистрироваться';
            }
        });

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.style.display = 'block';
            registerBtn.disabled = false;
            registerBtn.textContent = 'Зарегистрироваться';
        }
    </script>
</body>
</html>
